name: Release

# A push to main whose package.json version has no release yet is built, tested,
# packaged and published automatically — bumping the version and pushing is the whole
# release process; the tag is created by the workflow. Pushing a v* tag by hand still
# works, and the manual trigger exists to (re)release a tag that predates this workflow.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release, e.g. v0.1.4'
        required: true

permissions:
  # The built-in token may create tags and releases; no personal access token is involved.
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Determine the version to release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # An ordinary main push without a version bump lands here with a tag that is
          # already released — every later step is skipped rather than failed, so the
          # commit stays green and no duplicate release is attempted.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "This version is already released; nothing to do."
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag matches package.json version
        if: steps.version.outputs.new == 'true' && github.ref_type == 'tag'
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "${{ steps.version.outputs.tag }}" != "v$VERSION" ]; then
            echo "Tag ${{ steps.version.outputs.tag }} does not match package.json version $VERSION." >&2
            echo "Bump the version, commit, and re-tag so the release and the artifact agree." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.new == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      # No npm workspaces: the webview is its own package and needs its own install.
      - run: npm ci
        if: steps.version.outputs.new == 'true'
      - run: npm ci --prefix webview-ui
        if: steps.version.outputs.new == 'true'

      # A release that skipped the tests would defeat the point of having them.
      - run: npm run typecheck
        if: steps.version.outputs.new == 'true'
      - run: npm test
        if: steps.version.outputs.new == 'true'

      - name: Package
        if: steps.version.outputs.new == 'true'
        run: npx --yes @vscode/vsce package

      - name: Publish GitHub release
        if: steps.version.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # For a main push the tag does not exist yet; gh creates it at this commit
          # together with the release. Re-runs fall through to replacing the asset.
          gh release create "$TAG" repo-intelligence-*.vsix \
            --title "$TAG" \
            --generate-notes \
            --target "$GITHUB_SHA" || \
          gh release upload "$TAG" repo-intelligence-*.vsix --clobber
