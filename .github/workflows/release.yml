name: Release

# Pushing a tag like v0.1.5 builds, tests, packages the .vsix and publishes a GitHub
# release with it attached. The manual trigger exists so a release can be (re)created for
# a tag that was pushed before this workflow existed.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release, e.g. v0.1.4'
        required: true

permissions:
  # The built-in token may create releases; no personal access token is involved.
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      - run: npm ci
      - run: npm ci --prefix webview-ui

      # A release that skipped the tests would defeat the point of having them.
      - run: npm run typecheck
      - run: npm test

      - name: Check tag matches package.json version
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "Tag $TAG does not match package.json version $VERSION." >&2
            echo "Bump the version, commit, and re-tag so the release and the artifact agree." >&2
            exit 1
          fi

      - name: Package
        run: npx --yes @vscode/vsce package

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          gh release create "$TAG" repo-intelligence-*.vsix \
            --title "$TAG" \
            --generate-notes \
            --verify-tag || \
          gh release upload "$TAG" repo-intelligence-*.vsix --clobber
