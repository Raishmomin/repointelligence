name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      # No npm workspaces: the webview is its own package and needs its own install.
      - run: npm ci
      - run: npm ci --prefix webview-ui

      - run: npm run typecheck
      - run: npm test
      - run: npm run build
